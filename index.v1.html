<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="Kramlem Group" />
    <meta name="theme-color" content="#252627" />
    <title>Kramlem Group</title>
    <style>
      /* Reset */
      *, *::before, *::after { box-sizing: border-box; }
      html { line-height: 1.6; letter-spacing: 0.06em; scroll-behavior: smooth; }
      body { margin: 0; padding: 0; }

      /* Fonts */
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        font-size: 1rem;
        line-height: 1.54;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        display: flex;
        min-height: 100vh;
        flex-direction: column;
      }

      /* Light theme */
      body {
        background-color: #fff;
        color: #222;
      }

      /* Dark theme */
      body.dark-theme {
        background-color: #292a2d;
        color: #a9a9b3;
      }

      a { color: inherit; }

      /* Layout */
      .container {
        flex: 1 auto;
        display: flex;
        flex-direction: column;
        justify-content: center;
        text-align: center;
      }

      /* Header */
      .header {
        background: #fafafa;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        padding: 20px;
      }
      .dark-theme .header { background: #252627; }

      .header__inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin: 0 auto;
        width: 760px;
        max-width: 100%;
      }

      .header__right {
        display: flex;
        flex-direction: row;
        align-items: center;
      }

      /* Logo */
      .logo {
        display: flex;
        align-items: center;
        text-decoration: none;
        font-weight: 700;
        font-family: monospace, monospace;
      }
      .logo__mark { margin-right: 5px; }
      .logo__text { font-size: 1.125rem; }
      .logo__cursor {
        display: inline-block;
        width: 10px;
        height: 1rem;
        background: #fe5186;
        margin-left: 5px;
        border-radius: 1px;
        animation: cursor 1s infinite;
      }
      @media (prefers-reduced-motion: reduce) { .logo__cursor { animation: none; } }
      @keyframes cursor {
        0%   { opacity: 0; }
        50%  { opacity: 1; }
        100% { opacity: 0; }
      }

      /* Theme toggle */
      .theme-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        line-height: 1;
        cursor: pointer;
        user-select: none;
        -webkit-user-select: none;
      }
      .theme-toggler { fill: currentColor; }

      /* Content */
      .content {
        display: flex;
        flex-direction: column;
        flex: 1 auto;
        align-items: center;
        justify-content: center;
        margin: 0;
      }

      h1 { font-size: 2.625rem; }
      @media (max-width: 684px) { h1 { font-size: 2rem; } }

      /* HR */
      hr {
        width: 100%;
        border: none;
        background: #dcdcdc;
        height: 1px;
      }
      .dark-theme hr { background: #4a4b50; }
    </style>
  </head>

  <body class="dark-theme">
    <div class="container">
      <header class="header">
        <span class="header__inner">
          <a href="/" style="text-decoration: none;">
            <div class="logo">
              <span class="logo__mark">&gt;</span>
              <span class="logo__text">Enter:</span>
              <span class="logo__cursor"></span>
            </div>
          </a>
          <span class="header__right">
            <span class="theme-toggle" id="theme-toggle" title="Toggle theme">
              <svg class="theme-toggler" width="24" height="24" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M22 41C32.4934 41 41 32.4934 41 22C41 11.5066 32.4934 3 22
                3C11.5066 3 3 11.5066 3 22C3 32.4934 11.5066 41 22 41ZM7 22C7
                13.7157 13.7157 7 22 7V37C13.7157 37 7 30.2843 7 22Z"/>
              </svg>
            </span>
          </span>
        </span>
      </header>

      <div class="content">
        <main aria-role="main">
          <div>
            <h1>Kramlem Group</h1>
          </div>
        </main>
      </div>
    </div>

    <script>
      const toggle = document.getElementById('theme-toggle');
      const body = document.body;

      // Persist preference
      const saved = localStorage.getItem('theme');
      if (saved === 'light') body.classList.remove('dark-theme');

      toggle.addEventListener('click', () => {
        const isDark = body.classList.toggle('dark-theme');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
      });
    </script>
  </body>
</html>
