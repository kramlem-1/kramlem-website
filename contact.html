<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Contact Kramlem Group. Established 2000." />
  <title>Contact | Kramlem Group</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { min-height: 100vh; }
    .contact-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">Kramlem Group</a>
    <ul class="nav-links" id="nav-links">
      <li><a href="about.html">About</a></li>
      <li><a href="interests.html">Interests</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
    <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="contact-wrap">
    <div class="contact-section">
      <h2 class="contact-heading">Introductions</h2>
      <p class="contact-sub">
        Kramlem Group does not maintain an open enquiries channel.
        Relevant introductions reach us through those who already know us.
      </p>
      <span class="contact-note">By introduction only</span>
    </div>
  </div>

  <footer>
    <span class="footer-name">Kramlem Group</span>
    <div class="footer-right">Est. 2000</div>
  </footer>

  <script>
    const nav = document.querySelector('nav');
    const toggle = document.getElementById('nav-toggle');
    const links = document.getElementById('nav-links');
    window.addEventListener('scroll', () => {
      nav.classList.toggle('scrolled', window.scrollY > 10);
    }, { passive: true });
    toggle.addEventListener('click', () => {
      toggle.classList.toggle('open');
      links.classList.toggle('open');
    });
    links.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
      toggle.classList.remove('open');
      links.classList.remove('open');
    }));
  </script>
</body>
</html>
