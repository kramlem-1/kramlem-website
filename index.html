<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Kramlem Group. Established 1946." />
  <meta name="robots" content="index, follow" />
  <title>Kramlem Group</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }

    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 24px 60px;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 40%, rgba(184,154,90,0.06) 0%, transparent 70%),
        radial-gradient(ellipse 80% 60% at 50% 100%, rgba(184,154,90,0.03) 0%, transparent 60%);
      pointer-events: none;
    }

    .hero-est {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 28px;
    }

    .hero-name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(3rem, 10vw, 7.5rem);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--white);
      line-height: 1;
      margin-bottom: 16px;
    }

    .hero-rule {
      width: 60px;
      height: 1px;
      background: var(--gold);
      margin: 32px auto;
      opacity: 0.6;
    }

    .hero-tagline {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(1.1rem, 2.5vw, 1.5rem);
      font-weight: 300;
      color: var(--text);
      max-width: 520px;
      line-height: 1.6;
    }

    .hero-scroll {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .hero-scroll-line {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, var(--text-dim), transparent);
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">Kramlem Group</a>
    <ul class="nav-links" id="nav-links">
      <li><a href="about.html">About</a></li>
      <li><a href="interests.html">Interests</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="hero">
    <p class="hero-est">Established 1946</p>
    <h1 class="hero-name">Kramlem Group</h1>
    <div class="hero-rule"></div>
    <p class="hero-tagline">The work continues.</p>
    <div class="hero-scroll">
      <div class="hero-scroll-line"></div>
    </div>
  </div>

  <footer>
    <span class="footer-name">Kramlem Group</span>
    <div class="footer-right">Est. 1946</div>
  </footer>

  <script>
    const toggle = document.getElementById('nav-toggle');
    const links = document.getElementById('nav-links');
    toggle.addEventListener('click', () => {
      toggle.classList.toggle('open');
      links.classList.toggle('open');
    });
    links.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
      toggle.classList.remove('open');
      links.classList.remove('open');
    }));
  </script>
</body>
</html>
